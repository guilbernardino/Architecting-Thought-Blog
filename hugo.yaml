# Hugo configuration file
title: The Architecting Thought

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Newsletters
      pageRef: /docs
      weight: 1
    - name: Privacidade
      pageRef: /privacy
      weight: 3
    - name: Termos
      pageRef: /terms
      weight: 2

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"
